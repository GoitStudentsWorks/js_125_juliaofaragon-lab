<section class="feedback section" id="feedback">
  <div class="container feedback__container">
    <div class="section-head">
      <h2 class="section-title">Відгуки клієнтів</h2>
      <p class="section-text">Дізнайтеся, що кажуть наші задоволені клієнти про наші меблі.</p>
    </div>

    <div class="feedback__slider swiper js-feedback-slider">
      <div class="swiper-wrapper">
        <!-- Feedback slides go here -->
      </div>
    </div>

    <div class="feedback__controls">
      <div class="feedback__pagination js-feedback-pagination"></div>
      <div class="feedback__buttons">
        <button
          class="feedback__button js-feedback-prev"
          type="button"
          aria-label="Попередній слайд"
        >
          <svg class="feedback__button-icon" width="24" height="24">
            <use href="/src/img/feedbacks/feedback-sprite.svg#icon-left-arrow-alt"></use>
          </svg>
        </button>
        <button
          class="feedback__button js-feedback-next"
          type="button"
          aria-label="Наступний слайд"
        >
          <svg class="feedback__button-icon" width="24" height="24">
            <use href="/src/img/feedbacks/feedback-sprite.svg#icon-right-arrow-alt"></use>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
